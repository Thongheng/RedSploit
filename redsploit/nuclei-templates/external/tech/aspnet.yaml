id: external-aspnet-exposure

info:
  name: ASP.NET Stack File Exposure
  author: pwnflow
  severity: high
  tags: exposure,aspnet,dotnet,external

http:
  - method: GET
    path:
      - "{{BaseURL}}/web.config"
      - "{{BaseURL}}/Web.config"
      - "{{BaseURL}}/web.config.bak"
      - "{{BaseURL}}/web.config.old"
      - "{{BaseURL}}/appsettings.json"
      - "{{BaseURL}}/appsettings.Production.json"
      - "{{BaseURL}}/appsettings.Development.json"
      - "{{BaseURL}}/connectionstrings.config"
      - "{{BaseURL}}/elmah.axd"
      - "{{BaseURL}}/trace.axd"
      - "{{BaseURL}}/ScriptResource.axd"
      - "{{BaseURL}}/WebResource.axd"
      - "{{BaseURL}}/App_Data/web.config"
      - "{{BaseURL}}/App_Data/database.mdf"
      - "{{BaseURL}}/.vs/config/applicationhost.config"
      - "{{BaseURL}}/packages.config"
      - "{{BaseURL}}/project.json"
      - "{{BaseURL}}/global.asax"
      - "{{BaseURL}}/swagger"
      - "{{BaseURL}}/swagger/v1/swagger.json"

    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "connectionString"
          - "appSettings"
          - "machineKey"
          - "validationKey"
          - "decryptionKey"
          - "SqlConnection"
          - "elmah"
          - "asp.net"
          - "ASP.NET"
          - "\"ConnectionStrings\""

      - type: status
        status:
          - 200