id: external-api-exposure

info:
  name: API Stack File Exposure
  author: pwnflow
  severity: high
  tags: exposure,api,external

http:
  - method: GET
    path:
      - "{{BaseURL}}/swagger.json"
      - "{{BaseURL}}/swagger.yaml"
      - "{{BaseURL}}/openapi.json"
      - "{{BaseURL}}/openapi.yaml"
      - "{{BaseURL}}/api-docs"
      - "{{BaseURL}}/api-docs.json"
      - "{{BaseURL}}/docs"
      - "{{BaseURL}}/redoc"
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/graphiql"
      - "{{BaseURL}}/playground"
      - "{{BaseURL}}/api/graphql"
      - "{{BaseURL}}/v1"
      - "{{BaseURL}}/v2"
      - "{{BaseURL}}/v3"
      - "{{BaseURL}}/api/v1"
      - "{{BaseURL}}/api/v2"
      - "{{BaseURL}}/api/v3"
      - "{{BaseURL}}/api/v1/swagger.json"
      - "{{BaseURL}}/api/v2/swagger.json"
      - "{{BaseURL}}/api/health"
      - "{{BaseURL}}/api/status"
      - "{{BaseURL}}/api/debug"
      - "{{BaseURL}}/api/config"
      - "{{BaseURL}}/api/env"
      - "{{BaseURL}}/api/metrics"
      - "{{BaseURL}}/metrics"

    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "\"swagger\":"
          - "\"openapi\":"
          - "\"paths\":"
          - "\"info\":"
          - "graphql"
          - "__schema"
          - "\"query\":"
          - "\"mutation\":"
          - "\"version\":"

      - type: status
        status:
          - 200