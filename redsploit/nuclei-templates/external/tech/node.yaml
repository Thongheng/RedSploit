id: external-node-exposure

info:
  name: Node.js Stack File Exposure
  author: pwnflow
  severity: medium
  tags: exposure,node,external

http:
  - method: GET
    path:
      - "{{BaseURL}}/package.json"
      - "{{BaseURL}}/package-lock.json"
      - "{{BaseURL}}/yarn.lock"
      - "{{BaseURL}}/.npmrc"
      - "{{BaseURL}}/.nvmrc"
      - "{{BaseURL}}/npm-debug.log"
      - "{{BaseURL}}/yarn-error.log"
      - "{{BaseURL}}/server.js"
      - "{{BaseURL}}/app.js"
      - "{{BaseURL}}/index.js"
      - "{{BaseURL}}/config.js"
      - "{{BaseURL}}/config/database.js"
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/node_modules/.package-lock.json"
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/graphiql"
      - "{{BaseURL}}/v1"
      - "{{BaseURL}}/api/v1"

    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "\"dependencies\":"
          - "\"devDependencies\":"
          - "\"scripts\":"
          - "require("
          - "module.exports"
          - "process.env"
          - "mongoose"
          - "sequelize"
          - "_auth="

      - type: status
        status:
          - 200