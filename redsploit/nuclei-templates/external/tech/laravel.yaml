id: external-laravel-exposure

info:
  name: Laravel Stack File Exposure
  author: pwnflow
  severity: high
  tags: exposure,laravel,external

http:
  - method: GET
    path:
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.env.production"
      - "{{BaseURL}}/.env.staging"
      - "{{BaseURL}}/.env.local"
      - "{{BaseURL}}/.env.example"
      - "{{BaseURL}}/storage/logs/laravel.log"
      - "{{BaseURL}}/telescope"
      - "{{BaseURL}}/telescope/requests"
      - "{{BaseURL}}/horizon"
      - "{{BaseURL}}/horizon/api/stats"
      - "{{BaseURL}}/api/user"
      - "{{BaseURL}}/_debugbar/open"
      - "{{BaseURL}}/artisan"
      - "{{BaseURL}}/composer.json"
      - "{{BaseURL}}/composer.lock"
      - "{{BaseURL}}/phpunit.xml"
      - "{{BaseURL}}/.phpunit.result.cache"

    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "APP_KEY"
          - "APP_ENV"
          - "DB_CONNECTION"
          - "DB_PASSWORD"
          - "laravel"
          - "Illuminate"
          - "telescope"
          - "horizon"
          - "DebugBar"
          - "\"require\":"

      - type: status
        status:
          - 200