id: external-base-exposure

info:
  name: External Base File Exposure
  author: pwnflow
  severity: medium
  tags: exposure,misconfig,external

http:
  - method: GET
    path:
      - "{{BaseURL}}/.git/HEAD"
      - "{{BaseURL}}/.git/config"
      - "{{BaseURL}}/.git/logs/HEAD"
      - "{{BaseURL}}/.git/index"
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.env.backup"
      - "{{BaseURL}}/.env.old"
      - "{{BaseURL}}/robots.txt"
      - "{{BaseURL}}/sitemap.xml"
      - "{{BaseURL}}/sitemap_index.xml"
      - "{{BaseURL}}/security.txt"
      - "{{BaseURL}}/.well-known/security.txt"
      - "{{BaseURL}}/crossdomain.xml"
      - "{{BaseURL}}/clientaccesspolicy.xml"
      - "{{BaseURL}}/server-status"
      - "{{BaseURL}}/server-info"
      - "{{BaseURL}}/nginx_status"
      - "{{BaseURL}}/status"
      - "{{BaseURL}}/health"
      - "{{BaseURL}}/healthz"
      - "{{BaseURL}}/ping"
      - "{{BaseURL}}/swagger.json"
      - "{{BaseURL}}/swagger.yaml"
      - "{{BaseURL}}/swagger-ui.html"
      - "{{BaseURL}}/api/swagger.json"
      - "{{BaseURL}}/api/swagger.yaml"
      - "{{BaseURL}}/api-docs"
      - "{{BaseURL}}/api-docs.json"
      - "{{BaseURL}}/openapi.json"
      - "{{BaseURL}}/openapi.yaml"
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/graphiql"
      - "{{BaseURL}}/v1/swagger.json"
      - "{{BaseURL}}/v2/swagger.json"
      - "{{BaseURL}}/v3/swagger.json"
      - "{{BaseURL}}/backup.zip"
      - "{{BaseURL}}/backup.tar.gz"
      - "{{BaseURL}}/backup.sql"
      - "{{BaseURL}}/db.sql"
      - "{{BaseURL}}/dump.sql"
      - "{{BaseURL}}/config.json"
      - "{{BaseURL}}/config.yml"
      - "{{BaseURL}}/config.yaml"
      - "{{BaseURL}}/settings.json"
      - "{{BaseURL}}/.DS_Store"
      - "{{BaseURL}}/.htaccess"
      - "{{BaseURL}}/.htpasswd"

    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "ref: refs/"
          - "DB_PASSWORD"
          - "DB_HOST"
          - "APP_KEY"
          - "SECRET"
          - "User-agent:"
          - "allow-access-from"
          - "Contact:"
          - "swagger"
          - "openapi"
          - "\"paths\":"

      - type: status
        status:
          - 200