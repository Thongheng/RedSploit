name: "External Project Engagement"
mode: project
profile: cautious
version: "2.2"

# One-time external blackbox assessment against a single scoped target URL.
# Assumes WAF is present throughout. No active scanning.
# All three steps run in parallel at DAG depth 0 — no dependencies.
# Output feeds manual pentester follow-up; this workflow is recon-only.
#
# Depth modes (normal | deep): identical on external — only technology_profile
# affects the nuclei template selection. test_depth has no tool argument effect.

scope:
  domains:
    - "{{TARGET}}"

steps:

  # ── Depth 0 — TLS audit ────────────────────────────────────────────────────
  # SSL/TLS cipher and certificate analysis using nmap.
  # External targets may have multiple hosts.
  - id: tls_audit
    tool: nmap
    input: "{{TARGET}}"
    args:
      - "-sV"
      - "--script"
      - "ssl*"
      - "-p"
      - "443,8443"
      - "-Pn"
    output: tls_findings
    on_empty: warn
    on_failure: warn
    timeout_seconds: 180

  # ── Depth 0 — HTTP security headers ─────────────────────────────────────────
  # shcheck.py: single request per target. Checks HSTS, CSP, X-Frame-Options,
  # X-Content-Type-Options, Referrer-Policy, Permissions-Policy, cookie flags.
  # install: pipx install shcheck
  # Requires: shcheck.py on PATH. on_failure: warn — never blocks scan.
  - id: header_scan
    tool: shcheck
    input: "{{TARGET}}"
    args:
      - "-d"
      - "{{TARGET}}"
      - "--json"
    output: header_findings
    on_empty: warn
    on_failure: warn

  # ── Depth 0 — File exposure scan ────────────────────────────────────────────
  # nuclei with custom low-noise templates — one GET per path, WAF-safe.
  # Two templates always loaded:
  #   - external/base-exposure.yaml (all profiles)
  #   - external/tech/<profile>.yaml (profile-specific)
  # Respects technology_profile builder selection. Falls back to base if the
  # tech template file is missing.
  # NOTE: {{NUCLEI_TEMPLATES_PATH}} must be set in config or environment.
  # Default: ./nuclei-templates (same directory as this workflow file).
  - id: exposure_scan
    tool: nuclei
    input: "{{TARGET}}"
    args:
      - "-silent"
      - "-t"
      - "{{NUCLEI_TEMPLATES_PATH}}/external/base-exposure.yaml"
      - "-t"
      - "{{NUCLEI_TEMPLATES_PATH}}/external/tech/{{TECH_PROFILE}}.yaml"
      - "-u"
      - "{{TARGET}}"
    output: exposure_findings
    on_empty: warn
    on_failure: warn
    timeout_seconds: 300
