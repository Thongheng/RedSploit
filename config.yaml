web:
  wordlists:
    directory: /usr/share/wordlists/dirbuster/directory-list-2.3-medium.txt
    subdomain: /usr/share/seclists/Discovery/DNS/subdomains-top1million-5000.txt
    vhost: /usr/share/seclists/Discovery/DNS/subdomains-top1million-20000.txt
  configs:
    protocol:
      default: "http"
      https: "https"

infra:
  configs:
    nmap:
      mode:
        default: ""
        udp: "-sU"
        stealth: "-sS -T2"
        full: "-sV -sC -A -p-"
        quick: "-sV -F"
    smbclient:
      auth:
        default: ""
        none: "-N"
        guest: "-N -U ''"
    msf:
      payload:
        default: "windows/meterpreter/reverse_tcp"
        linux_tcp: "linux/x64/meterpreter/reverse_tcp"
        linux_shell: "linux/x64/shell_reverse_tcp"
        windows_shell: "windows/x64/shell_reverse_tcp"
        windows_https: "windows/meterpreter/reverse_https"


