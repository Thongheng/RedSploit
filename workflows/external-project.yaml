name: "External Project Engagement"
mode: project
profile: cautious
version: "2.2"

# One-time external blackbox assessment against a single scoped target URL.
# Assumes WAF is present throughout. No active scanning.
# All three steps run in parallel at DAG depth 0 — no dependencies.
# Output feeds manual pentester follow-up; this workflow is recon-only.
#
# Depth modes (normal | deep): identical on external — only technology_profile
# affects the nuclei template selection. test_depth has no tool argument effect.

scope:
  domains:
    - "{{TARGET}}"

steps:

  # ── Depth 0 — TLS/SSL audit ────────────────────────────────────────────────
  # SSL/TLS security analysis using nmap ssl scripts
  - id: tls_audit
    tool: nmap
    input: "{{TARGET}}"
    args:
      - "--script"
      - "ssl-cert,ssl-enum-ciphers,ssl-known-key,ssl-date"
      - "-p"
      - "443"
      - "-Pn"
    output: tls_findings
    on_empty: warn
    on_failure: warn
    timeout_seconds: 300

  # ── Depth 0 — HTTP security headers ─────────────────────────────────────────
  # shcheck.py: single request per target. Checks HSTS, CSP, X-Frame-Options,
  # X-Content-Type-Options, Referrer-Policy, Permissions-Policy, cookie flags.
  # install: pipx install shcheck
  - id: header_scan
    tool: shcheck
    input: "{{TARGET}}"
    args:
      - "-d"
      - "{{TARGET}}"
      - "--json"
    output: header_findings
    on_empty: warn
    on_failure: warn

  # ── Depth 0 — File exposure scan ────────────────────────────────────────────
  # nuclei with custom low-noise templates — one GET per path, WAF-safe.
  # Templates at: {{NUCLEI_TEMPLATES_PATH}}/external/
  - id: exposure_scan
    tool: nuclei
    input: "{{TARGET}}"
    args:
      - "-silent"
      - "-t"
      - "{{NUCLEI_TEMPLATES_PATH}}/external/base-exposure.yaml"
      - "-t"
      - "{{NUCLEI_TEMPLATES_PATH}}/external/tech/{{TECH_PROFILE}}.yaml"
      - "-u"
      - "{{TARGET}}"
    output: exposure_findings
    on_empty: warn
    on_failure: warn
    timeout_seconds: 3600
